name: Build Multi Platform

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-release-tag:
    name: Validate release tag
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.version.outputs.package_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Read package version
        id: version
        run: echo "package_version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package version
        run: |
          expected_tag="v${{ steps.version.outputs.package_version }}"
          actual_tag="${{ github.ref_name }}"
          if [ "$actual_tag" != "$expected_tag" ]; then
            echo "Tag $actual_tag does not match package.json version $expected_tag"
            exit 1
          fi

  build:
    name: ${{ matrix.name }}
    needs: validate-release-tag
    if: always() && (needs.validate-release-tag.result == 'success' || needs.validate-release-tag.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target_platform: linux
            target_arch: x64
            archive_glob: release/artifacts/linux-x64/*.tar.gz
            installer_glob: release/artifacts/linux-x64/*.deb
          - name: macos-arm64
            os: macos-14
            target_platform: darwin
            target_arch: arm64
            archive_glob: release/artifacts/darwin-arm64/*.tar.gz
            installer_glob: release/artifacts/darwin-arm64/*.pkg
          - name: windows-x64
            os: windows-latest
            target_platform: win32
            target_arch: x64
            archive_glob: release/artifacts/win32-x64/*.zip
            installer_glob: release/remote-terminal-cloud-agent-*/artifacts/windows/installer-build-root/artifacts/windows/out/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build platform artifact
        env:
          RTC_TARGET_PLATFORM: ${{ matrix.target_platform }}
          RTC_TARGET_ARCH: ${{ matrix.target_arch }}
        run: pnpm build:artifact

      - name: Prepare Windows installer stage
        if: matrix.target_platform == 'win32'
        shell: pwsh
        run: |
          $bundle = Get-ChildItem -Path release -Directory | Where-Object { $_.Name -like 'remote-terminal-cloud-agent-*' } | Select-Object -First 1
          if (-not $bundle) { throw 'release bundle not found' }
          $nodeExe = (Get-Command node).Source
          powershell -ExecutionPolicy Bypass -File packaging/windows/nsis/prepare-installer-stage.ps1 -AgentBundleRoot $bundle.FullName -NodeRuntimeRoot $nodeExe -Force

      - name: Build Windows installer
        if: matrix.target_platform == 'win32'
        shell: pwsh
        run: |
          $bundle = Get-ChildItem -Path release -Directory | Where-Object { $_.Name -like 'remote-terminal-cloud-agent-*' } | Select-Object -First 1
          if (-not $bundle) { throw 'release bundle not found' }
          $buildRoot = Join-Path $bundle.FullName 'artifacts\windows\installer-build-root'
          powershell -ExecutionPolicy Bypass -File packaging/windows/nsis/build-installer.ps1 -AgentBuildRoot $buildRoot

      - name: Upload platform archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.archive_glob }}
          if-no-files-found: error

      - name: Upload native installer
        if: matrix.installer_glob != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-installer
          path: ${{ matrix.installer_glob }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - validate-release-tag
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate SHA256 checksums
        run: |
          find release-assets -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.exe' -o -name '*.deb' -o -name '*.pkg' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > release-assets/SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          name: Remote Terminal Cloud Agent ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.zip
            release-assets/**/*.exe
            release-assets/**/*.deb
            release-assets/**/*.pkg
            release-assets/SHA256SUMS.txt