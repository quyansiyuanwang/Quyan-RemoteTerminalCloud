name: Build Multi Platform

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Tag v*: validate version, build all platforms, publish release ──────────
  validate-release-tag:
    name: Validate release tag
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.version.outputs.package_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: echo "package_version=$(tr -d '\r\n' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches VERSION
        run: |
          expected_tag="v${{ steps.version.outputs.package_version }}"
          actual_tag="${{ github.ref_name }}"
          if [ "$actual_tag" != "$expected_tag" ]; then
            echo "Tag $actual_tag does not match VERSION $expected_tag"
            exit 1
          fi

  build:
    name: ${{ matrix.name }}
    needs: validate-release-tag
    if: needs.validate-release-tag.result == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target_platform: linux
            target_arch: x64
            archive_glob: release/artifacts/linux-x64/*.tar.gz
            installer_glob: release/artifacts/linux-x64/*.deb
          - name: macos-arm64
            os: macos-14
            target_platform: darwin
            target_arch: arm64
            archive_glob: release/artifacts/darwin-arm64/*.tar.gz
            installer_glob: release/artifacts/darwin-arm64/*.pkg
            desktop_glob: release/artifacts/darwin-arm64/*.dmg
          - name: windows-x64
            os: windows-latest
            target_platform: win32
            target_arch: x64
            archive_glob: release/artifacts/win32-x64/*.zip
            installer_glob: release/artifacts/windows-installers/tauri/nsis/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/rtc-agent-desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Linux desktop build deps
        if: matrix.target_platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install desktop frontend dependencies
        run: npm ci
        working-directory: apps/rtc-agent-desktop

      - name: Build platform artifact
        env:
          RTC_TARGET_PLATFORM: ${{ matrix.target_platform }}
          RTC_TARGET_ARCH: ${{ matrix.target_arch }}
        run: cargo xtask artifact

      - name: Build Windows desktop bundle
        if: matrix.target_platform == 'win32'
        run: cargo xtask windows-desktop-bundle --bundles nsis

      - name: Build macOS desktop bundle (.app/.dmg)
        if: matrix.target_platform == 'darwin'
        env:
          RTC_TARGET_PLATFORM: ${{ matrix.target_platform }}
          RTC_TARGET_ARCH: ${{ matrix.target_arch }}
        run: cargo xtask package

      - name: Upload platform archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.archive_glob }}
          if-no-files-found: error

      - name: Upload native installer
        if: matrix.installer_glob != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-installer
          path: ${{ matrix.installer_glob }}
          if-no-files-found: error

      - name: Upload macOS desktop bundle
        if: matrix.desktop_glob != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-desktop
          path: ${{ matrix.desktop_glob }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - validate-release-tag
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate SHA256 checksums
        run: |
          find release-assets -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.exe' -o -name '*.deb' -o -name '*.pkg' -o -name '*.dmg' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > release-assets/SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          name: Remote Terminal Cloud Agent ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.zip
            release-assets/**/*.exe
            release-assets/**/*.deb
            release-assets/**/*.pkg
            release-assets/**/*.dmg
            release-assets/SHA256SUMS.txt
