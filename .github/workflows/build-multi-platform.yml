name: Build Multi Platform

on:
  push:
    tags:
      - "v*"
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Tag v*: bump version files, commit back to master ──────────────────────
  prepare-release:
    name: Bump version
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.bump.outputs.package_version }}
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.RELEASE_PAT }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Bump version
        id: bump
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          cargo xtask version "$version"
          echo "package_version=$version" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ github.ref_name }}"
          git push

  build:
    name: ${{ matrix.name }}
    needs: prepare-release
    if: always() && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ────────────────────────────────────────────────────────────
          - name: linux-x64
            os: ubuntu-latest
            target_platform: linux
            target_arch: x64
            rust_target: x86_64-unknown-linux-gnu
            cross: false
            installer_glob: release/artifacts/linux-x64/*.deb
            archive_glob: release/artifacts/linux-x64/*.tar.gz
            portable_bin: build/bin/linux-x64/rtc-agent
          - name: linux-arm64
            os: ubuntu-latest
            target_platform: linux
            target_arch: arm64
            rust_target: aarch64-unknown-linux-gnu
            cross: true
            portable_bin: build/bin/linux-arm64/rtc-agent
          # ── macOS ────────────────────────────────────────────────────────────
          - name: macos-arm64
            os: macos-14
            target_platform: darwin
            target_arch: arm64
            rust_target: aarch64-apple-darwin
            cross: false
            installer_glob: release/artifacts/darwin-arm64/*.pkg
            desktop_glob: release/artifacts/darwin-arm64/*.dmg
            portable_bin: build/bin/darwin-arm64/rtc-agent
          - name: macos-x64
            os: macos-latest
            target_platform: darwin
            target_arch: x64
            rust_target: x86_64-apple-darwin
            cross: true
            portable_bin: build/bin/darwin-x64/rtc-agent
          # ── Windows ──────────────────────────────────────────────────────────
          - name: windows-x64
            os: windows-latest
            target_platform: win32
            target_arch: x64
            rust_target: x86_64-pc-windows-msvc
            cross: false
            installer_glob: release/artifacts/windows-installers/tauri/nsis/*.exe
            portable_bin: build/bin/win32-x64/rtc-agent.exe
          - name: windows-arm64
            os: windows-latest
            target_platform: win32
            target_arch: arm64
            rust_target: aarch64-pc-windows-msvc
            cross: false
            portable_bin: build/bin/win32-arm64/rtc-agent.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: matrix.installer_glob != '' || matrix.desktop_glob != ''
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/rtc-agent-desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust_target }}

      - name: Install cross (Linux cross-compile)
        if: matrix.cross == true && matrix.target_platform == 'linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Setup Linux desktop build deps
        if: matrix.target_platform == 'linux' && matrix.cross == false
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
          version: 1.0

      - name: Install desktop frontend dependencies
        if: (matrix.installer_glob != '' || matrix.desktop_glob != '') && matrix.cross == false
        run: npm ci
        working-directory: apps/rtc-agent-desktop

      - name: Build portable binary (cross)
        if: matrix.cross == true && matrix.target_platform == 'linux'
        env:
          RTC_TARGET_PLATFORM: ${{ matrix.target_platform }}
          RTC_TARGET_ARCH: ${{ matrix.target_arch }}
        run: |
          cross build --release -p rtc-agentd --target ${{ matrix.rust_target }}
          mkdir -p build/bin/${{ matrix.target_platform }}-${{ matrix.target_arch }}
          cp target/${{ matrix.rust_target }}/release/rtc-agentd build/bin/${{ matrix.target_platform }}-${{ matrix.target_arch }}/rtc-agent

      - name: Build portable binary (macOS x64 cross-compile)
        if: matrix.cross == true && matrix.target_platform == 'darwin'
        env:
          RTC_TARGET_PLATFORM: ${{ matrix.target_platform }}
          RTC_TARGET_ARCH: ${{ matrix.target_arch }}
        run: |
          cargo build --release -p rtc-agentd --target ${{ matrix.rust_target }}
          mkdir -p build/bin/darwin-x64
          cp target/${{ matrix.rust_target }}/release/rtc-agentd build/bin/darwin-x64/rtc-agent

      - name: Build portable binary (Windows arm64)
        if: matrix.target_platform == 'win32' && matrix.target_arch == 'arm64'
        env:
          RTC_TARGET_PLATFORM: ${{ matrix.target_platform }}
          RTC_TARGET_ARCH: ${{ matrix.target_arch }}
        run: |
          cargo build --release -p rtc-agentd --target ${{ matrix.rust_target }}
          New-Item -ItemType Directory -Force build/bin/win32-arm64
          Copy-Item target/${{ matrix.rust_target }}/release/rtc-agentd.exe build/bin/win32-arm64/rtc-agent.exe

      - name: Build platform artifact
        if: matrix.cross == false && matrix.target_platform != 'win32'
        env:
          RTC_TARGET_PLATFORM: ${{ matrix.target_platform }}
          RTC_TARGET_ARCH: ${{ matrix.target_arch }}
        run: cargo xtask artifact

      - name: Build Windows desktop bundle
        if: matrix.target_platform == 'win32' && matrix.target_arch == 'x64'
        run: cargo xtask windows-desktop-bundle --bundles nsis

      - name: Build portable binary (Windows x64)
        if: matrix.target_platform == 'win32' && matrix.target_arch == 'x64'
        run: |
          cargo build --release -p rtc-agentd
          New-Item -ItemType Directory -Force build/bin/win32-x64
          Copy-Item target/release/rtc-agentd.exe build/bin/win32-x64/rtc-agent.exe

      - name: Build macOS desktop bundle (.app/.dmg)
        if: matrix.target_platform == 'darwin' && matrix.desktop_glob != ''
        env:
          RTC_TARGET_PLATFORM: ${{ matrix.target_platform }}
          RTC_TARGET_ARCH: ${{ matrix.target_arch }}
        run: cargo xtask package

      - name: Upload native installer
        if: matrix.installer_glob != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-installer
          path: ${{ matrix.installer_glob }}
          if-no-files-found: error

      - name: Upload macOS desktop bundle
        if: matrix.desktop_glob != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-desktop
          path: ${{ matrix.desktop_glob }}
          if-no-files-found: error

      - name: Upload portable binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-portable
          path: ${{ matrix.portable_bin }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - prepare-release
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Rename portable binaries
        run: |
          ver="${{ github.ref_name }}"
          for entry in release-assets/*-portable; do
            name=$(basename "$entry")
            platform=${name%-portable}
            if [ -f "$entry/rtc-agent.exe" ]; then
              mv "$entry/rtc-agent.exe" "$entry/rtc-agent-${ver}-${platform}.exe"
            elif [ -f "$entry/rtc-agent" ]; then
              mv "$entry/rtc-agent" "$entry/rtc-agent-${ver}-${platform}"
            fi
          done

      - name: Generate SHA256 checksums
        run: |
          find release-assets -type f \( -name '*.exe' -o -name '*.deb' -o -name '*.pkg' -o -name '*.dmg' -o -name 'rtc-agent-*' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > release-assets/SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          name: Remote Terminal Cloud Agent ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            release-assets/**/*.exe
            release-assets/**/*.deb
            release-assets/**/*.pkg
            release-assets/**/*.dmg
            release-assets/*-portable/rtc-agent-*
            release-assets/SHA256SUMS.txt
