name: Build CI Docker image

on:
  schedule:
    # Weekly rebuild to pick up security updates
    - cron: '23 5 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase repo
        id: repo
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/ci.Dockerfile
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.REPO }}/ci:latest
          provenance: false
